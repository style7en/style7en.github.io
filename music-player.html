<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云音乐播放器</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg-primary: #0f0f0f;
    --bg-secondary: #1a1a1a;
    --bg-tertiary: #252525;
    --bg-hover: #333333;
    --text-primary: #ffffff;
    --text-secondary: #999999;
    --text-tertiary: #666666;
    --accent-color: #ec4141;
    --accent-hover: #ff5e5e;
    --border-color: #2a2a2a;
}

.light-theme {
    --bg-primary: #f5f5f5;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e8e8e8;
    --bg-hover: #f0f0f0;
    --text-primary: #333333;
    --text-secondary: #666666;
    --text-tertiary: #999999;
    --border-color: #e0e0e0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: background 0.3s;
}

body.light-theme {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.phone-container {
    width: 375px;
    height: 812px;
    background: #000;
    border-radius: 40px;
    padding: 12px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 2px #333;
    position: relative;
}

.phone-frame {
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f0f 100%);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    transition: background 0.3s;
}

.light-theme .phone-frame {
    background: linear-gradient(180deg, #fff 0%, #f5f5f5 100%);
}

.phone-screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
    padding-bottom: 34px;
}

.status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 20px;
    font-size: 11px;
}

.status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 4px;
}

.carrier { font-size: 10px; }
.signal-icon, .wifi-icon, .battery-icon { width: 14px; height: 14px; }
.battery-percent { font-size: 10px; }

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
}

.header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.header-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--text-primary);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.header-btn:hover { background: var(--bg-hover); }
.header-btn svg { width: 20px; height: 20px; }
.header-title { font-size: 16px; font-weight: 500; }

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-y: auto;
}

.album-container {
    width: 260px;
    height: 260px;
    margin-bottom: 30px;
}

.album-cover {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
}

.album-cover.playing { animation: pulse 2s ease-in-out infinite; }

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

.music-note {
    font-size: 80px;
    color: rgba(255, 255, 255, 0.3);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
}

.song-info {
    text-align: center;
    margin-bottom: 24px;
    width: 100%;
}

.song-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
}

.progress-section {
    width: 100%;
    margin-bottom: 24px;
}

.progress-bar-container {
    width: 100%;
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    margin-bottom: 8px;
    cursor: pointer;
    position: relative;
}

.progress-bar {
    height: 100%;
    background: var(--accent-color);
    border-radius: 2px;
    width: 0%;
    position: relative;
}

.progress-handle {
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: var(--text-primary);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.time-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-tertiary);
}

.controls-section {
    padding: 16px 20px;
    background: linear-gradient(to top, var(--bg-secondary), transparent);
}

.secondary-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 16px;
}

.control-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.control-btn:hover { color: var(--text-primary); }
.control-btn.active { color: var(--accent-color); }
.control-btn svg { width: 24px; height: 24px; }

.primary-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
}

.play-btn {
    width: 64px;
    height: 64px;
    border: none;
    background: var(--accent-color);
    color: #fff;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(236, 65, 65, 0.4);
    transition: all 0.2s;
}

.play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
.play-btn:active { transform: scale(0.95); }
.play-btn svg { width: 28px; height: 28px; }
.play-btn .pause-icon { display: none; }
.play-btn.playing .play-icon { display: none; }
.play-btn.playing .pause-icon { display: block; }

.volume-section {
    padding: 12px 0 0;
}

.volume-slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
}

.volume-slider {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--bg-tertiary);
    border-radius: 2px;
    cursor: pointer;
}

.volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--text-primary);
    border-radius: 50%;
    cursor: pointer;
}

.playlist-sidebar {
    position: absolute;
    top: 0;
    right: 0;
    width: 280px;
    height: 100%;
    background: var(--bg-secondary);
    transform: translateX(100%);
    transition: transform 0.3s;
    z-index: 10;
    border-radius: 0 32px 32px 0;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
}

.playlist-sidebar.open { transform: translateX(0); }

.playlist-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 44px 16px 16px;
    border-bottom: 1px solid var(--border-color);
}

.playlist-sidebar-title { font-size: 16px; font-weight: 600; }

.playlist-sidebar-close {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.playlist-sidebar-close:hover { background: var(--bg-hover); }
.playlist-sidebar-close svg { width: 20px; height: 20px; }

.playlist-sidebar-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

.playlist-sidebar-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
}

.playlist-sidebar-item:hover { background: var(--bg-hover); }
.playlist-sidebar-item.active { background: var(--bg-tertiary); }
.playlist-sidebar-item.playing { background: rgba(236, 65, 65, 0.1); }

.playlist-sidebar-item-info { flex: 1; min-width: 0; }

.playlist-sidebar-item-title {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.playlist-sidebar-item.active .playlist-sidebar-item-title { color: var(--accent-color); }

.playlist-sidebar-delete {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text-tertiary);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0;
}

.playlist-sidebar-item:hover .playlist-sidebar-delete { opacity: 1; }
.playlist-sidebar-delete:hover { color: var(--accent-color); background: var(--bg-hover); }
.playlist-sidebar-delete svg { width: 14px; height: 14px; }

.playlist-sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border-color);
}

.add-song-btn {
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--border-color);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.add-song-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
.add-song-btn svg { width: 18px; height: 18px; }

.add-song-modal {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 20px;
}

.add-song-modal.open { display: flex; }

.add-song-modal-content {
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 300px;
}

.add-song-modal-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    text-align: center;
}

.add-song-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.add-song-input {
    padding: 12px;
    border: 1px solid var(--border-color);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.add-song-input:focus { border-color: var(--accent-color); }
.add-song-input::placeholder { color: var(--text-tertiary); }

.add-song-buttons {
    display: flex;
    gap: 12px;
    margin-top: 8px;
}

.add-song-cancel {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border-color);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.add-song-cancel:hover { background: var(--bg-hover); }

.add-song-confirm {
    flex: 1;
    padding: 12px;
    border: none;
    background: var(--accent-color);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.add-song-confirm:hover { background: var(--accent-hover); }

.loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    border-radius: 40px;
}

.loading-overlay.active { opacity: 1; pointer-events: auto; }

.loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--bg-tertiary);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.toast {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.add-song-source {
    margin-top: 8px;
}

.source-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

.source-tab {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border-color);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

.source-tab:hover { background: var(--bg-hover); }
.source-tab.active {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: #fff;
}

.source-content {
    min-height: 60px;
}

.file-input-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    border: 2px dashed var(--border-color);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 14px;
    transition: all 0.2s;
}

.file-input-label:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.file-input-label svg {
    width: 20px;
    height: 20px;
}

.file-name {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
    </style>
</head>

    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen" id="phone-screen">
                <div class="status-bar">
                    <div class="status-left">
                        <span class="carrier">中国移动</span>
                        <svg class="signal-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M2 17h2v5H2zm4-3h2v8H6zm4-3h2v11h-2zm4-3h2v14h-2z"/></svg>
                        <svg class="wifi-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 6c3.537 0 6.837 1.353 9.293 3.808l1.414-1.415C19.874 5.56 16.071 4 12 4s-7.874 1.56-10.707 4.393l1.414 1.415C5.163 7.353 8.463 6 12 6zm0 4c2.347 0 4.549.911 6.207 2.586l1.414-1.415C17.587 9.117 14.881 8 12 8s-5.587 1.117-7.621 3.171l1.414 1.415C7.451 10.911 9.653 10 12 10zm0 4c1.156 0 2.261.451 3.071 1.271l1.429-1.429C15.266 12.602 13.674 12 12 12s-3.266.602-4.5 1.842l1.429 1.429C9.739 14.451 10.844 14 12 14z"/><circle cx="12" cy="18" r="2"/></svg>
                    </div>
                    <div class="status-center">
                        <span id="status-time">12:00</span>
                    </div>
                    <div class="status-right">
                        <svg class="battery-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
                        <span class="battery-percent">100%</span>
                    </div>
                </div>

                <div class="header">
                    <div class="header-left">
                        <button class="header-btn" id="back-btn" aria-label="返回">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        </button>
                        <span class="header-title">正在播放</span>
                    </div>
                    <div class="header-right">
                        <button class="header-btn" id="theme-btn" aria-label="切换主题">
                            <svg class="theme-light-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>
                            <svg class="theme-dark-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                        </button>
                        <button class="header-btn" id="share-btn" aria-label="分享">

                        </button>
                    </div>
                </div>

                <div class="main-content">

                        <div class="album-cover" id="album-cover">
                            <div class="music-note">♪</div>

                    <div class="song-info">

                <div class="controls-section">

                        <button class="control-btn" id="loop-btn" title="循环模式">
                            <svg id="loop-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>

                            <svg id="shuffle-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                        </button>
                        <button class="control-btn" id="playlist-btn" title="播放列表">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
                        </button>
                    </div>

                    <div class="primary-controls">
                        <button class="control-btn" id="prev-btn" title="上一首">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button class="play-btn" id="play-btn" title="播放">
                            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button class="control-btn" id="next-btn" title="下一首">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                    </div>

                    <div class="volume-section">
                        <div class="volume-slider-container">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
                        </div>
                    </div>
                </div>

                <div class="playlist-sidebar" id="playlist-sidebar">
                    <div class="playlist-sidebar-header">
                        <span class="playlist-sidebar-title">播放列表</span>
                        <button class="playlist-sidebar-close" id="close-sidebar" aria-label="关闭">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                        </button>
                    </div>
                    <div class="playlist-sidebar-items" id="playlist-items"></div>
                    <div class="playlist-sidebar-footer">
                        <button class="add-song-btn" id="add-song-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                            添加歌曲
                        </button>
                    </div>
                </div>

                <div class="add-song-modal" id="add-song-modal">
                    <div class="add-song-modal-content">
                        <h3 class="add-song-modal-title">添加歌曲</h3>
                        <div class="add-song-form">
                            <div class="add-song-source">
                                <div class="source-tabs">
                                    <button class="source-tab active" data-source="local">本地文件</button>
                                    <button class="source-tab" data-source="url">网络地址</button>
                                </div>
                                <div class="source-content" id="source-local">
                                    <label class="file-input-label">
                                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                                        选择音频文件
                                        <input type="file" id="input-file" accept="audio/*" hidden multiple>
                                    </label>
                                    <div class="file-name" id="file-name">支持多选</div>
                                </div>
                                <div class="source-content" id="source-url" style="display:none">
                                    <input type="text" class="add-song-input" id="input-url" placeholder="音频地址 (mp3)" maxlength="500">
                                </div>
                            </div>
                            <div class="add-song-buttons">
                                <button class="add-song-cancel" id="btn-cancel">取消</button>
                                <button class="add-song-confirm" id="btn-confirm">添加</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="loading-overlay" id="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
        <div class="toast" id="toast"></div>
    </div>

    <audio id="audio"></audio>

    <script>
const $ = id => document.getElementById(id);

class Player {
    constructor() {
        this.playlist = [];
        this.current = 0;
        this.playing = false;
        this.mode = 'list';
        this.dark = true;
        this.blobUrls = new Map();
        this.lastSaved = 0;
        this.restoreTime = 0;
        this.shouldPlay = false;
        this.db = null;
        
        this.audio = $('audio');
        this.initDB().then(() => {
            this.loadStorage();
            this.init();
        });
        
        this.clock();
        setInterval(() => this.clock(), 1000);
    }

    async initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('MusicPlayerDB', 1);
            
            request.onerror = () => {
                console.error('IndexedDB初始化失败');
                resolve();
            };
            
            request.onsuccess = () => {
                this.db = request.result;
                resolve();
            };
            
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('songs')) {
                    db.createObjectStore('songs', { keyPath: 'id' });
                }
            };
        });
    }

    async saveSongToDB(id, blob) {
        if (!this.db) return;
        return new Promise((resolve) => {
            const tx = this.db.transaction(['songs'], 'readwrite');
            const store = tx.objectStore('songs');
            store.put({ id, blob });
            tx.oncomplete = () => resolve();
            tx.onerror = () => resolve();
        });
    }

    async loadSongFromDB(id) {
        if (!this.db) return null;
        return new Promise((resolve) => {
            const tx = this.db.transaction(['songs'], 'readonly');
            const store = tx.objectStore('songs');
            const request = store.get(id);
            request.onsuccess = () => resolve(request.result?.blob || null);
            request.onerror = () => resolve(null);
        });
    }

    async deleteSongFromDB(id) {
        if (!this.db) return;
        return new Promise((resolve) => {
            const tx = this.db.transaction(['songs'], 'readwrite');
            const store = tx.objectStore('songs');
            store.delete(id);
            tx.oncomplete = () => resolve();
        });
    }

    escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async loadStorage() {
        try {
            const data = localStorage.getItem('player_playlist');
            if (data) {
                const parsed = JSON.parse(data);
                if (Array.isArray(parsed)) {
                    this.playlist = parsed.filter(s => s && s.title && s.url);
                }
            }
        } catch (e) {
            console.error('加载存储失败', e);
        }
    }

    loadProgress() {
        try {
            const data = localStorage.getItem('player_progress');
            if (data) {
                const parsed = JSON.parse(data);
                return {
                    index: parsed.index || 0,
                    time: parsed.time || 0,
                    volume: parsed.volume || 80
                };
            }
        } catch (e) {
            console.error('加载进度失败', e);
        }
        return { index: 0, time: 0, volume: 80 };
    }

    saveProgress() {
        try {
            const progress = {
                index: this.current,
                time: this.audio.currentTime || 0,
                volume: $('volume-slider').value
            };
            localStorage.setItem('player_progress', JSON.stringify(progress));
        } catch (e) {}
    }

    saveStorage() {
        try {
            localStorage.setItem('player_playlist', JSON.stringify(this.playlist));
        } catch (e) {
            this.toast('存储空间不足');
        }
    }

    toast(msg) {
        const el = $('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }

    showLoading() { $('loading').classList.add('active'); }
    hideLoading() { $('loading').classList.remove('active'); }

    init() {
        this.bindEvents();
        this.renderList();
        
        const progress = this.loadProgress();
        $('volume-slider').value = progress.volume;
        this.audio.volume = progress.volume / 100;
        
        if (this.playlist.length > 0) {
            const idx = Math.min(progress.index, this.playlist.length - 1);
            this.restoreTime = progress.time;
            this.load(idx);
        } else {
            $('song-title').textContent = '暂无歌曲';
        }
    }

    bindEvents() {
        $('play-btn').onclick = () => this.toggle();
        $('prev-btn').onclick = () => this.prev();
        $('next-btn').onclick = () => this.next();
        $('loop-btn').onclick = () => this.switchMode();
        $('volume-slider').oninput = e => this.audio.volume = e.target.value / 100;
        $('playlist-btn').onclick = () => $('playlist-sidebar').classList.toggle('open');
        $('close-sidebar').onclick = () => $('playlist-sidebar').classList.remove('open');
        $('theme-btn').onclick = () => this.toggleTheme();
        $('share-btn').onclick = () => this.share();
        $('add-song-btn').onclick = () => this.openAddModal();
        $('btn-cancel').onclick = () => this.closeAddModal();
        $('btn-confirm').onclick = () => this.addSong();
        $('progress-bar').onclick = e => this.seek(e);

        $('input-file').onchange = e => {
            const files = e.target.files;
            if (files.length > 0) {
                if (files.length === 1) {
                    $('file-name').textContent = files[0].name;
                } else {
                    $('file-name').textContent = `已选择 ${files.length} 个文件`;
                }
            }
        };

        document.querySelectorAll('.source-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const source = tab.dataset.source;
                $('source-local').style.display = source === 'local' ? 'block' : 'none';
                $('source-url').style.display = source === 'url' ? 'block' : 'none';
            };
        });

        this.audio.ontimeupdate = () => this.updateProgress();
        this.audio.onloadedmetadata = () => this.updateDuration();
        this.audio.onended = () => this.onEnd();
        this.audio.onerror = () => this.onError();
        this.audio.onwaiting = () => this.showLoading();
        this.audio.oncanplay = () => this.hideLoading();

        document.onkeydown = e => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); this.toggle(); }
            if (e.code === 'ArrowRight') this.audio.currentTime += 10;
            if (e.code === 'ArrowLeft') this.audio.currentTime -= 10;
        };

        $('phone-screen').onclick = e => {
            if (!$('playlist-sidebar').classList.contains('open')) return;
            if (!e.target.closest('#playlist-sidebar') && !e.target.closest('#playlist-btn')) {
                $('playlist-sidebar').classList.remove('open');
            }
        };
    }

    openAddModal() {
        $('add-song-modal').classList.add('open');
        $('input-url').value = '';
        $('input-file').value = '';
        $('file-name').textContent = '支持多选';
    }

    closeAddModal() {
        $('add-song-modal').classList.remove('open');
    }
    
    parseSongName(filename) {
        return filename.replace(/\.[^.]+$/, '').trim();
    }

    toggleTheme() {
        this.dark = !this.dark;
        document.body.classList.toggle('light-theme', !this.dark);
        const light = $('theme-btn').querySelector('.theme-light-icon');
        const dark = $('theme-btn').querySelector('.theme-dark-icon');
        light.style.display = this.dark ? 'none' : 'block';
        dark.style.display = this.dark ? 'block' : 'none';
    }

    share() {
        const song = this.playlist[this.current];
        if (!song) return;
        if (navigator.share) {
            navigator.share({ title: song.title, text: song.title, url: location.href }).catch(() => {});
        } else {
            navigator.clipboard.writeText(song.title).then(() => this.toast('已复制到剪贴板'));
        }
    }

    switchMode() {
        const modes = ['list', 'single', 'shuffle'];
        const icons = ['loop-icon', 'single-icon', 'shuffle-icon'];
        const idx = modes.indexOf(this.mode);
        this.mode = modes[(idx + 1) % 3];
        icons.forEach((id, i) => $(id).style.display = i === (idx + 1) % 3 ? 'block' : 'none');
    }

    formatTime(s) {
        if (isNaN(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60).toString().padStart(2, '0');
        return `${m}:${sec}`;
    }

    seek(e) {
        const rect = $('progress-bar').getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        this.audio.currentTime = pct * this.audio.duration;
    }

    updateProgress() {
        if (!this.audio.duration) return;
        const pct = (this.audio.currentTime / this.audio.duration) * 100;
        $('progress').style.width = `${pct}%`;
        $('current-time').textContent = this.formatTime(this.audio.currentTime);
        
        const now = Date.now();
        if (now - this.lastSaved > 5000) {
            this.saveProgress();
            this.lastSaved = now;
        }
    }

    updateDuration() {
        $('total-time').textContent = this.formatTime(this.audio.duration);
        const song = this.playlist[this.current];
        if (song) $('song-title').textContent = song.title;
        this.hideLoading();
        
        if (this.restoreTime && this.restoreTime < this.audio.duration) {
            this.audio.currentTime = this.restoreTime;
            this.restoreTime = 0;
        }
        
        if (this.shouldPlay) {
            this.shouldPlay = false;
            this.play();
        }
    }

    clock() {
        const now = new Date();
        $('status-time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }

    async load(idx) {
        const song = this.playlist[idx];
        if (!song) return;
        
        this.current = idx;
        this.showLoading();
        
        $('song-title').textContent = '加载中...';
        $('album-cover').style.background = song.cover;
        
        this.updateListUI();
        
        try {
            const blobUrl = await this.loadAudio(song.url);
            this.audio.src = blobUrl;
            this.audio.load();
        } catch (e) {
            this.onError();
        }
    }

    async loadAudio(url) {
        if (this.blobUrls.has(url)) {
            return this.blobUrls.get(url);
        }
        
        if (url.startsWith('blob:')) {
            return url;
        }
        
        if (url.startsWith('local_')) {
            const blob = await this.loadSongFromDB(url);
            if (blob) {
                const blobUrl = URL.createObjectURL(blob);
                this.blobUrls.set(url, blobUrl);
                return blobUrl;
            }
            throw new Error('本地歌曲数据丢失');
        }
        
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            return url;
        }
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('加载失败');
            
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            
            this.blobUrls.set(url, blobUrl);
            return blobUrl;
        } catch (e) {
            return url;
        }
    }

    revokeBlobUrl(url) {
        if (this.blobUrls.has(url)) {
            URL.revokeObjectURL(this.blobUrls.get(url));
            this.blobUrls.delete(url);
        }
    }

    renderList() {
        $('playlist-items').innerHTML = this.playlist.map((s, i) => `
            <div class="playlist-sidebar-item" data-idx="${i}">
                <div class="playlist-sidebar-item-info">
                    <div class="playlist-sidebar-item-title">${this.escapeHtml(s.title)}</div>
                </div>
                <button class="playlist-sidebar-delete" data-idx="${i}">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
            </div>
        `).join('');

        $('playlist-items').onclick = e => {
            const item = e.target.closest('.playlist-sidebar-item');
            const del = e.target.closest('.playlist-sidebar-delete');
            if (del) {
                e.stopPropagation();
                this.deleteSong(+del.dataset.idx);
            } else if (item) {
                this.playAt(+item.dataset.idx);
            }
        };
    }

    updateListUI() {
        [...$('playlist-items').children].forEach((el, i) => {
            el.classList.toggle('active', i === this.current);
            el.classList.toggle('playing', i === this.current && this.playing);
        });
    }

    async addSong() {
        const files = $('input-file').files;
        const url = $('input-url').value.trim();

        if (files.length > 0) {
            let added = 0;
            for (const file of files) {
                const title = this.parseSongName(file.name);
                const songId = `local_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                
                await this.saveSongToDB(songId, file);
                
                const blobUrl = URL.createObjectURL(file);
                this.blobUrls.set(songId, blobUrl);
                
                this.playlist.push({
                    title,
                    url: songId,
                    cover: this.getRandomCover()
                });
                added++;
            }

            if (added > 0) {
                this.saveStorage();
                this.renderList();
                this.closeAddModal();
                
                const newIdx = this.playlist.length - added;
                this.load(newIdx);
                this.shouldPlay = true;
                
                this.toast(`成功添加 ${added} 首歌曲`);
            }
            return;
        }

        if (!url) {
            this.toast('请选择文件或输入URL');
            return;
        }

        if (!/^https?:\/\/.+/.test(url)) {
            this.toast('请输入有效的URL');
            return;
        }

        const filename = url.split('/').pop().split('?')[0] || '未知歌曲';
        const title = this.parseSongName(filename);

        this.playlist.push({
            title, url,
            cover: this.getRandomCover()
        });

        this.saveStorage();
        this.renderList();
        this.closeAddModal();
        
        const newIdx = this.playlist.length - 1;
        this.load(newIdx);
        this.shouldPlay = true;
        
        this.toast('添加成功');
    }

    getRandomCover() {
        const colors = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'
        ];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    async deleteSong(idx) {
        const song = this.playlist[idx];
        
        if (song.url.startsWith('local_')) {
            await this.deleteSongFromDB(song.url);
        }
        
        this.revokeBlobUrl(song.url);
        
        const wasCurrent = idx === this.current;
        this.playlist.splice(idx, 1);

        if (this.playlist.length === 0) {
            this.current = 0;
            this.playing = false;
            this.audio.src = '';
            $('song-title').textContent = '暂无歌曲';
            $('play-btn').classList.remove('playing');
            $('album-cover').classList.remove('playing');
        } else if (wasCurrent) {
            this.current = Math.min(this.current, this.playlist.length - 1);
            this.load(this.current);
        } else if (idx < this.current) {
            this.current--;
        }

        this.saveStorage();
        this.renderList();
        this.updateListUI();
        this.toast('已删除');
    }

    toggle() {
        this.playing ? this.pause() : this.play(true);
    }

    play(showError = false) {
        if (!this.audio.src) return;
        this.audio.play().then(() => {
            this.playing = true;
            $('play-btn').classList.add('playing');
            $('album-cover').classList.add('playing');
            this.updateListUI();
        }).catch(() => {
            if (showError) this.toast('播放失败');
        });
    }

    pause() {
        this.audio.pause();
        this.playing = false;
        $('play-btn').classList.remove('playing');
        $('album-cover').classList.remove('playing');
        this.updateListUI();
    }

    playAt(idx) {
        this.load(idx);
        this.shouldPlay = true;
        $('playlist-sidebar').classList.remove('open');
    }

    prev() {
        if (!this.playlist.length) return;
        this.load((this.current - 1 + this.playlist.length) % this.playlist.length);
        this.shouldPlay = true;
    }

    next() {
        if (!this.playlist.length) return;
        let idx;
        if (this.mode === 'shuffle') {
            do { idx = Math.floor(Math.random() * this.playlist.length); } while (idx === this.current && this.playlist.length > 1);
        } else {
            idx = (this.current + 1) % this.playlist.length;
        }
        this.load(idx);
        this.shouldPlay = true;
    }

    onEnd() {
        if (this.mode === 'single') {
            this.audio.currentTime = 0;
            this.play();
        } else {
            this.next();
        }
    }

    onError() {
        this.hideLoading();
        this.pause();
        $('song-title').textContent = '加载失败';
        this.toast('音频加载失败');
        if (this.playlist.length > 1) setTimeout(() => this.next(), 2000);
    }
}

new Player();
    </script>
</body>
</html>
