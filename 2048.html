<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffd93d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(240, 147, 251, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(240, 147, 251, 0.6)); }
            to { filter: drop-shadow(0 0 30px rgba(245, 87, 108, 0.8)); }
        }

        .scores {
            display: flex;
            gap: 15px;
        }

        .score-box {
            background: linear-gradient(135deg, #2d3436 0%, #1e272e 100%);
            padding: 10px 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .score-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
        }

        .game-container {
            position: relative;
            background: linear-gradient(145deg, #2d3436, #1e272e);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 
                0 0 0 2px rgba(255, 255, 255, 0.05),
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 60px rgba(0, 0, 0, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            grid-template-rows: repeat(4, 90px);
            gap: 10px;
            position: relative;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            position: relative;
        }

        .tile {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 32px;
            transition: all 0.15s ease-in-out;
            z-index: 10;
        }

        .tile.new {
            animation: appear 0.2s ease-in-out;
        }

        .tile.merged {
            animation: pop 0.2s ease-in-out;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .tile-4 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.5);
        }

        .tile-8 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .tile-16 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #fff;
            box-shadow: 0 0 20px rgba(67, 233, 123, 0.5);
        }

        .tile-32 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #fff;
            box-shadow: 0 0 20px rgba(250, 112, 154, 0.5);
        }

        .tile-64 {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: #fff;
            box-shadow: 0 0 25px rgba(161, 140, 209, 0.6);
        }

        .tile-128 {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 154, 158, 0.7);
            font-size: 28px;
        }

        .tile-256 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #333;
            box-shadow: 0 0 30px rgba(252, 182, 159, 0.7);
            font-size: 28px;
        }

        .tile-512 {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #333;
            box-shadow: 0 0 35px rgba(161, 196, 253, 0.8);
            font-size: 28px;
        }

        .tile-1024 {
            background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%);
            color: #333;
            box-shadow: 0 0 40px rgba(210, 153, 194, 0.9);
            font-size: 22px;
        }

        .tile-2048 {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            color: #fff;
            box-shadow: 0 0 50px rgba(245, 175, 25, 1);
            font-size: 22px;
            animation: winner 0.5s ease-in-out infinite alternate;
        }

        @keyframes winner {
            from { box-shadow: 0 0 50px rgba(245, 175, 25, 1); }
            to { box-shadow: 0 0 70px rgba(241, 39, 17, 1); }
        }

        .tile-super {
            background: linear-gradient(135deg, #0c0c0c 0%, #434343 50%, #0c0c0c 100%);
            color: #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.8);
            font-size: 18px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-new {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-ai {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .btn-ai.active {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .instructions {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        .instructions span {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin: 0 3px;
        }

        /* 移动端虚拟方向键 */
        .dpad-container {
            display: none;
            margin-top: 20px;
            justify-content: center;
        }

        .dpad {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
        }

        .dpad-btn {
            background: linear-gradient(145deg, #3a3a5a, #2a2a4a);
            border: 2px solid #5a5a7a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #ccc;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.15s;
        }

        .dpad-btn:active {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #fff;
            transform: scale(0.95);
        }

        .dpad-btn.up { grid-area: up; }
        .dpad-btn.down { grid-area: down; }
        .dpad-btn.left { grid-area: left; }
        .dpad-btn.right { grid-area: right; }

        /* 移动端适配 */
        @media (max-width: 500px) {
            .container { padding: 10px; }
            .title { font-size: 36px; }
            .score-box { padding: 6px 12px; }
            .score-label { font-size: 10px; }
            .score-value { font-size: 18px; }
            .game-container { padding: 8px; }
            .grid { 
                grid-template-columns: repeat(4, 70px);
                grid-template-rows: repeat(4, 70px);
                gap: 6px; 
            }
            .cell { width: 70px; height: 70px; }
            .controls { gap: 8px; }
            .btn { padding: 8px 14px; font-size: 12px; }
            .instructions { font-size: 11px; }
            .dpad-container { display: flex; }
            .dpad { grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); }
        }

        @media (hover: none) and (pointer: coarse) {
            .dpad-container { display: flex; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="game-info">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-container">
            <div class="grid" id="grid">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="overlay" id="overlay">
                <div class="overlay-title" id="overlay-title">Game Over!</div>
                <div class="overlay-score" id="overlay-score">Score: 0</div>
                <button class="btn btn-new" onclick="game.restart()">Try Again</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-new" onclick="game.restart()">New Game</button>
            <button class="btn btn-ai" id="aiBtn" onclick="game.toggleAI()">AI: OFF</button>
        </div>

        <div class="instructions">
            Use <span>Arrow Keys</span> or <span>WASD</span> to play
        </div>

        <!-- 移动端虚拟方向键 -->
        <div class="dpad-container">
            <div class="dpad">
                <button class="dpad-btn up" id="btn-up">▲</button>
                <button class="dpad-btn left" id="btn-left">◀</button>
                <button class="dpad-btn right" id="btn-right">▶</button>
                <button class="dpad-btn down" id="btn-down">▼</button>
            </div>
        </div>
    </div>

    <script>
        // 创建背景粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        class Game2048 {
            constructor() {
                this.grid = document.getElementById('grid');
                this.scoreEl = document.getElementById('score');
                this.bestEl = document.getElementById('best');
                this.overlay = document.getElementById('overlay');
                this.overlayTitle = document.getElementById('overlay-title');
                this.overlayScore = document.getElementById('overlay-score');
                this.aiBtn = document.getElementById('aiBtn');
                
                this.size = 4;
                this.cells = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('best2048')) || 0;
                this.aiRunning = false;
                this.aiInterval = null;
                
                this.bestEl.textContent = this.best;
                
                this.init();
                this.bindEvents();
            }

            init() {
                this.cells = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.scoreEl.textContent = '0';
                this.overlay.classList.remove('show');
                
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            restart() {
                if (this.aiInterval) {
                    clearInterval(this.aiInterval);
                    this.aiInterval = null;
                }
                this.aiRunning = false;
                this.aiBtn.textContent = 'AI: OFF';
                this.aiBtn.classList.remove('active');
                this.init();
            }

            addRandomTile() {
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.cells[r][c] === 0) {
                            empty.push({ r, c });
                        }
                    }
                }
                if (empty.length > 0) {
                    const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                    this.cells[r][c] = Math.random() < 0.9 ? 2 : 4;
                    return { r, c };
                }
                return null;
            }

            render(newTile = null, mergedTiles = []) {
                const existingTiles = this.grid.querySelectorAll('.tile');
                existingTiles.forEach(t => t.remove());

                // 动态获取格子大小和间距
                const cell = document.querySelector('.cell');
                const cellWidth = cell ? cell.offsetWidth : 90;
                
                // 动态获取gap值
                const gridStyle = window.getComputedStyle(this.grid);
                const gap = parseInt(gridStyle.gap) || 10;
                
                const cellTotal = cellWidth + gap;

                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.cells[r][c] !== 0) {
                            const tile = document.createElement('div');
                            const value = this.cells[r][c];
                            tile.className = `tile tile-${value > 2048 ? 'super' : value}`;
                            tile.textContent = value;
                            tile.style.top = (r * cellTotal) + 'px';
                            tile.style.left = (c * cellTotal) + 'px';
                            tile.style.width = cellWidth + 'px';
                            tile.style.height = cellWidth + 'px';
                            
                            // 调整字体大小
                            if (cellWidth < 80) {
                                tile.style.fontSize = '24px';
                            } else if (cellWidth < 90) {
                                tile.style.fontSize = '28px';
                            }
                            
                            if (newTile && newTile.r === r && newTile.c === c) {
                                tile.classList.add('new');
                            }
                            if (mergedTiles.some(t => t.r === r && t.c === c)) {
                                tile.classList.add('merged');
                            }
                            
                            this.grid.appendChild(tile);
                        }
                    }
                }
            }

            move(direction) {
                const oldCells = this.cells.map(row => [...row]);
                let moved = false;
                let mergedTiles = [];
                
                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const vector = vectors[direction];
                const traversals = this.buildTraversals(vector);

                this.cells = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                const merged = Array(this.size).fill(null).map(() => Array(this.size).fill(false));

                for (const r of traversals.r) {
                    for (const c of traversals.c) {
                        const value = oldCells[r][c];
                        if (value === 0) continue;

                        let newR = r;
                        let newC = c;

                        while (true) {
                            const nextR = newR + vector.r;
                            const nextC = newC + vector.c;

                            if (nextR < 0 || nextR >= this.size || nextC < 0 || nextC >= this.size) break;

                            if (this.cells[nextR][nextC] === 0) {
                                newR = nextR;
                                newC = nextC;
                            } else if (this.cells[nextR][nextC] === value && !merged[nextR][nextC]) {
                                newR = nextR;
                                newC = nextC;
                                merged[newR][newC] = true;
                                mergedTiles.push({ r: newR, c: newC });
                                break;
                            } else {
                                break;
                            }
                        }

                        if (merged[newR][newC]) {
                            this.cells[newR][newC] = value * 2;
                            this.score += value * 2;
                        } else {
                            this.cells[newR][newC] = value;
                        }

                        if (newR !== r || newC !== c) {
                            moved = true;
                        }
                    }
                }

                if (moved) {
                    const newTile = this.addRandomTile();
                    this.render(newTile, mergedTiles);
                    this.updateScore();
                    
                    if (this.isGameOver()) {
                        this.gameOver();
                    }
                }

                return moved;
            }

            buildTraversals(vector) {
                const traversals = { r: [], c: [] };
                for (let i = 0; i < this.size; i++) {
                    traversals.r.push(i);
                    traversals.c.push(i);
                }
                if (vector.r === 1) traversals.r.reverse();
                if (vector.c === 1) traversals.c.reverse();
                return traversals;
            }

            updateScore() {
                this.scoreEl.textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    this.bestEl.textContent = this.best;
                    localStorage.setItem('best2048', this.best);
                }
            }

            isGameOver() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.cells[r][c] === 0) return false;
                        if (r < this.size - 1 && this.cells[r][c] === this.cells[r + 1][c]) return false;
                        if (c < this.size - 1 && this.cells[r][c] === this.cells[r][c + 1]) return false;
                    }
                }
                return true;
            }

            gameOver() {
                if (this.aiInterval) {
                    clearInterval(this.aiInterval);
                    this.aiInterval = null;
                    this.aiRunning = false;
                    this.aiBtn.textContent = 'AI: OFF';
                    this.aiBtn.classList.remove('active');
                }
                
                const maxTile = Math.max(...this.cells.flat());
                if (maxTile >= 2048) {
                    this.overlayTitle.textContent = 'You Win!';
                } else {
                    this.overlayTitle.textContent = 'Game Over!';
                }
                this.overlayScore.textContent = `Score: ${this.score}`;
                this.overlay.classList.add('show');
            }

            // AI 相关
            toggleAI() {
                this.aiRunning = !this.aiRunning;
                this.aiBtn.textContent = this.aiRunning ? 'AI: ON' : 'AI: OFF';
                this.aiBtn.classList.toggle('active', this.aiRunning);
                
                if (this.aiRunning) {
                    this.overlay.classList.remove('show');
                    this.aiInterval = setInterval(() => this.aiMove(), 100);
                } else {
                    clearInterval(this.aiInterval);
                    this.aiInterval = null;
                }
            }

            aiMove() {
                if (this.isGameOver()) {
                    this.gameOver();
                    return;
                }

                // 动态搜索深度：根据空格数调整
                let empty = 0;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.cells[r][c] === 0) empty++;
                    }
                }
                
                // 空格越少搜索越深
                let depth = empty <= 4 ? 5 : empty <= 8 ? 4 : 3;

                const directions = ['up', 'down', 'left', 'right'];
                let bestMove = null;
                let bestScore = -Infinity;

                for (const dir of directions) {
                    const result = this.simulateMoveExact(dir, this.cells);
                    if (result.moved) {
                        const score = this.expectimax(result.cells, depth, false);
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = dir;
                        }
                    }
                }

                if (bestMove) {
                    this.move(bestMove);
                }
            }

            expectimax(cells, depth, isPlayer) {
                if (depth === 0) {
                    return this.evaluate(cells);
                }

                if (isPlayer) {
                    let maxScore = -Infinity;
                    const directions = ['up', 'down', 'left', 'right'];
                    
                    for (const dir of directions) {
                        const result = this.simulateMoveExact(dir, cells);
                        if (result.moved) {
                            const score = this.expectimax(result.cells, depth - 1, false);
                            maxScore = Math.max(maxScore, score);
                        }
                    }
                    return maxScore === -Infinity ? this.evaluate(cells) : maxScore;
                } else {
                    let emptyCells = [];
                    
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (cells[r][c] === 0) {
                                emptyCells.push({ r, c });
                            }
                        }
                    }

                    if (emptyCells.length === 0) {
                        return this.evaluate(cells);
                    }

                    // 智能采样：优先考虑角落和边缘位置
                    const cornerPriority = (cell) => {
                        const cornerDist = Math.min(cell.r, 3 - cell.r) + Math.min(cell.c, 3 - cell.c);
                        return cornerDist;
                    };
                    
                    emptyCells.sort((a, b) => cornerPriority(a) - cornerPriority(b));
                    
                    // 根据深度调整采样数量
                    let samples = depth >= 4 ? 2 : depth >= 3 ? 3 : Math.min(emptyCells.length, 4);
                    samples = Math.min(samples, emptyCells.length);
                    
                    let score = 0;
                    
                    for (let i = 0; i < samples; i++) {
                        const { r, c } = emptyCells[i];
                        
                        // 90% 放 2
                        const newCells2 = cells.map(row => [...row]);
                        newCells2[r][c] = 2;
                        score += 0.9 * this.expectimax(newCells2, depth - 1, true);
                        
                        // 10% 放 4（深度较低时才考虑）
                        if (depth <= 3) {
                            const newCells4 = cells.map(row => [...row]);
                            newCells4[r][c] = 4;
                            score += 0.1 * this.expectimax(newCells4, depth - 1, true);
                        } else {
                            // 深度较大时简化计算
                            score += 0.1 * this.expectimax(newCells2, depth - 1, true);
                        }
                    }

                    return score / samples;
                }
            }

            simulateMoveExact(direction, cells) {
                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const vector = vectors[direction];
                const traversals = this.buildTraversals(vector);
                const newCells = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                const merged = Array(this.size).fill(null).map(() => Array(this.size).fill(false));
                let moved = false;
                let score = 0;

                for (const r of traversals.r) {
                    for (const c of traversals.c) {
                        const value = cells[r][c];
                        if (value === 0) continue;

                        let newR = r, newC = c;
                        while (true) {
                            const nextR = newR + vector.r;
                            const nextC = newC + vector.c;
                            if (nextR < 0 || nextR >= this.size || nextC < 0 || nextC >= this.size) break;
                            if (newCells[nextR][nextC] === 0) {
                                newR = nextR; newC = nextC;
                            } else if (newCells[nextR][nextC] === value && !merged[nextR][nextC]) {
                                newR = nextR; newC = nextC;
                                merged[newR][newC] = true;
                                break;
                            } else break;
                        }

                        if (merged[newR][newC]) {
                            newCells[newR][newC] = value * 2;
                            score += value * 2;
                        } else {
                            newCells[newR][newC] = value;
                        }
                        if (newR !== r || newC !== c) moved = true;
                    }
                }

                return { cells: newCells, moved, score };
            }

            evaluate(cells) {
                const EMPTY_WEIGHT = 270;
                const MERGES_WEIGHT = 700;
                const MONO_WEIGHT = 47;
                const SUM_WEIGHT = 11;
                const LOST_PENALTY = 200000;
                
                let empty = 0;
                let merges = 0;
                let sum = 0;
                let maxTile = 0;
                
                // 计算空格数、合并潜力、总和
                for (let r = 0; r < this.size; r++) {
                    let prev = 0;
                    let counter = 0;
                    for (let c = 0; c < this.size; c++) {
                        const val = cells[r][c];
                        if (val === 0) {
                            empty++;
                        } else {
                            sum += Math.pow(val, 3.5);
                            maxTile = Math.max(maxTile, val);
                            if (prev === val) {
                                counter++;
                            } else if (counter > 0) {
                                merges += 1 + counter;
                                counter = 0;
                            }
                            prev = val;
                        }
                    }
                    if (counter > 0) merges += 1 + counter;
                }
                
                for (let c = 0; c < this.size; c++) {
                    let prev = 0;
                    let counter = 0;
                    for (let r = 0; r < this.size; r++) {
                        const val = cells[r][c];
                        if (val !== 0) {
                            if (prev === val) {
                                counter++;
                            } else if (counter > 0) {
                                merges += 1 + counter;
                                counter = 0;
                            }
                            prev = val;
                        }
                    }
                    if (counter > 0) merges += 1 + counter;
                }
                
                // 单调性计算
                let mono = 0;
                for (let r = 0; r < this.size; r++) {
                    let left = 0, right = 0;
                    for (let c = 0; c < this.size - 1; c++) {
                        const cur = cells[r][c] ? Math.log2(cells[r][c]) : 0;
                        const next = cells[r][c + 1] ? Math.log2(cells[r][c + 1]) : 0;
                        if (cur > next) left += Math.pow(next - cur, 4);
                        else right += Math.pow(cur - next, 4);
                    }
                    mono += Math.min(left, right);
                }
                
                for (let c = 0; c < this.size; c++) {
                    let up = 0, down = 0;
                    for (let r = 0; r < this.size - 1; r++) {
                        const cur = cells[r][c] ? Math.log2(cells[r][c]) : 0;
                        const next = cells[r + 1][c] ? Math.log2(cells[r + 1][c]) : 0;
                        if (cur > next) up += Math.pow(next - cur, 4);
                        else down += Math.pow(cur - next, 4);
                    }
                    mono += Math.min(up, down);
                }
                
                // 蛇形权重矩阵（角落最大）
                const snakeWeights = [
                    [15, 14, 13, 12],
                    [8, 9, 10, 11],
                    [7, 6, 5, 4],
                    [0, 1, 2, 3]
                ];
                
                let snakeScore = 0;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (cells[r][c] !== 0) {
                            snakeScore += snakeWeights[r][c] * cells[r][c];
                        }
                    }
                }
                
                // 平滑度
                let smooth = 0;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (cells[r][c] !== 0) {
                            const val = Math.log2(cells[r][c]);
                            if (c < this.size - 1 && cells[r][c + 1] !== 0) {
                                smooth -= Math.abs(val - Math.log2(cells[r][c + 1]));
                            }
                            if (r < this.size - 1 && cells[r + 1][c] !== 0) {
                                smooth -= Math.abs(val - Math.log2(cells[r + 1][c]));
                            }
                        }
                    }
                }
                
                // 游戏结束检测
                let isLost = true;
                for (let r = 0; r < this.size && isLost; r++) {
                    for (let c = 0; c < this.size && isLost; c++) {
                        if (cells[r][c] === 0) isLost = false;
                        if (r < this.size - 1 && cells[r][c] === cells[r + 1][c]) isLost = false;
                        if (c < this.size - 1 && cells[r][c] === cells[r][c + 1]) isLost = false;
                    }
                }
                
                if (isLost) return -Infinity;
                
                return snakeScore * 10 
                     + EMPTY_WEIGHT * Math.log2(empty + 1) 
                     + MERGES_WEIGHT * merges 
                     - MONO_WEIGHT * mono 
                     - SUM_WEIGHT * Math.log2(sum + 1) 
                     + smooth * 10;
            }

            simulateMove(direction) {
                const cells = this.cells.map(row => [...row]);
                let moved = false;
                let score = 0;
                let mergeCount = 0;
                
                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const vector = vectors[direction];
                const traversals = this.buildTraversals(vector);

                const newCells = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                const merged = Array(this.size).fill(null).map(() => Array(this.size).fill(false));

                for (const r of traversals.r) {
                    for (const c of traversals.c) {
                        const value = cells[r][c];
                        if (value === 0) continue;

                        let newR = r;
                        let newC = c;

                        while (true) {
                            const nextR = newR + vector.r;
                            const nextC = newC + vector.c;

                            if (nextR < 0 || nextR >= this.size || nextC < 0 || nextC >= this.size) break;

                            if (newCells[nextR][nextC] === 0) {
                                newR = nextR;
                                newC = nextC;
                            } else if (newCells[nextR][nextC] === value && !merged[nextR][nextC]) {
                                newR = nextR;
                                newC = nextC;
                                merged[newR][newC] = true;
                                score += value * 2;
                                mergeCount++;
                                break;
                            } else {
                                break;
                            }
                        }

                        newCells[newR][newC] = merged[newR][newC] ? value * 2 : value;
                        if (newR !== r || newC !== c) moved = true;
                    }
                }

                // 无效移动返回负无穷
                if (!moved) return -Infinity;

                // 计算空格数
                let emptyCount = 0;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (newCells[r][c] === 0) emptyCount++;
                    }
                }

                // 单调性评估
                let monotonicity = 0;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size - 1; c++) {
                        if (newCells[r][c] >= newCells[r][c + 1]) monotonicity++;
                    }
                }
                for (let c = 0; c < this.size; c++) {
                    for (let r = 0; r < this.size - 1; r++) {
                        if (newCells[r][c] >= newCells[r + 1][c]) monotonicity++;
                    }
                }

                // 平滑度评估
                let smoothness = 0;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (newCells[r][c] !== 0) {
                            const val = Math.log2(newCells[r][c]);
                            if (r < this.size - 1 && newCells[r + 1][c] !== 0) {
                                smoothness -= Math.abs(val - Math.log2(newCells[r + 1][c]));
                            }
                            if (c < this.size - 1 && newCells[r][c + 1] !== 0) {
                                smoothness -= Math.abs(val - Math.log2(newCells[r][c + 1]));
                            }
                        }
                    }
                }

                // 最大值位置评估（角落优先）
                let maxVal = 0;
                let maxPos = { r: 0, c: 0 };
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (newCells[r][c] > maxVal) {
                            maxVal = newCells[r][c];
                            maxPos = { r, c };
                        }
                    }
                }
                const cornerBonus = ((maxPos.r === 0 || maxPos.r === 3) && 
                                     (maxPos.c === 0 || maxPos.c === 3)) ? maxVal * 2 : 0;

                return score * 1.5 + emptyCount * 2.7 + monotonicity * 1.0 + smoothness * 0.1 + mergeCount * 10 + cornerBonus;
            }

            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (this.aiRunning) return;
                    
                    const keyMap = {
                        ArrowUp: 'up',
                        ArrowDown: 'down',
                        ArrowLeft: 'left',
                        ArrowRight: 'right',
                        w: 'up',
                        W: 'up',
                        s: 'down',
                        S: 'down',
                        a: 'left',
                        A: 'left',
                        d: 'right',
                        D: 'right'
                    };

                    if (keyMap[e.key]) {
                        e.preventDefault();
                        this.move(keyMap[e.key]);
                    }
                });

                // 触摸滑动支持
                let touchStartX = 0;
                let touchStartY = 0;

                const gameContainer = document.querySelector('.game-container');
                
                gameContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                gameContainer.addEventListener('touchend', (e) => {
                    if (this.aiRunning) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    const minSwipe = 30;

                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > minSwipe) this.move('right');
                        else if (dx < -minSwipe) this.move('left');
                    } else {
                        if (dy > minSwipe) this.move('down');
                        else if (dy < -minSwipe) this.move('up');
                    }
                }, { passive: true });

                // 虚拟方向键
                const btnUp = document.getElementById('btn-up');
                const btnDown = document.getElementById('btn-down');
                const btnLeft = document.getElementById('btn-left');
                const btnRight = document.getElementById('btn-right');

                const handleMove = (dir) => {
                    if (!this.aiRunning) this.move(dir);
                };

                btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('up'); });
                btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('down'); });
                btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('left'); });
                btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('right'); });

                btnUp.addEventListener('click', () => handleMove('up'));
                btnDown.addEventListener('click', () => handleMove('down'));
                btnLeft.addEventListener('click', () => handleMove('left'));
                btnRight.addEventListener('click', () => handleMove('right'));
            }
        }

        const game = new Game2048();
    </script>
